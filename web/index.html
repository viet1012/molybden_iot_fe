<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="flutter_web_app">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>Dashboard Molybden</title>
    <link rel="manifest" href="manifest.json">

    <script>
        // TẮT SERVICE WORKER HOÀN TOÀN
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
                for (let r of regs) r.unregister();
            });
        }

        // CONFIG CANVASKIT TỪ SERVER 8381
        self.flutterConfiguration = {
            canvasKitBaseUrl: "http://192.168.122.15:8381/"
        };
    </script>

    <script defer src="flutter_bootstrap.js"></script>
</head>
<body>
<script>
    window.addEventListener('load', function (ev) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
</script>
</body>
</html>
